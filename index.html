<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULLSWATER | MASTER LEDGER v7.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --black: #000; --white: #fff; --gray: #f4f4f4; }
        body { font-family: 'Courier New', Courier, monospace; background: var(--gray); padding: 10px; color: var(--black); margin: 0; }
        .form-container { max-width: 1000px; background: var(--white); margin: auto; padding: 25px; border: 4px solid var(--black); box-shadow: 12px 12px 0px var(--black); }
        
        /* HEADER & VIVID QR */
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; border-bottom: 6px solid var(--black); padding-bottom: 20px; margin-bottom: 20px; gap: 20px; }
        #qrcode-container { border: 5px solid var(--black); padding: 12px; background: var(--white); width: 280px; text-align: center; flex-shrink: 0; margin: auto; }
        #qrcode img { width: 100%; height: auto; image-rendering: pixelated; }

        /* FILTER SYSTEM */
        .filter-section { background: var(--black); color: var(--white); padding: 12px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; font-weight: 900; }
        .filter-section input { background: var(--white); border: none; padding: 5px; font-family: inherit; width: 140px; }

        /* TABLE ARCHITECTURE */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th, td { border: 2px solid var(--black); padding: 10px; text-align: center; vertical-align: top; word-wrap: break-word; }
        .bg-black { background: var(--black); color: var(--white); }
        input, textarea { width: 100%; border: none; outline: none; font-family: inherit; font-weight: bold; background: transparent; font-size: 14px; }
        textarea { resize: vertical; min-height: 45px; overflow: hidden; line-height: 1.4; }

        /* SIGNATURE & UI */
        #sig-canvas { border: 2px dashed var(--black); background: #fafafa; width: 100%; height: 120px; touch-action: none; }
        .no-print { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 25px; }
        button { padding: 14px 20px; cursor: pointer; border: 3px solid var(--black); font-weight: 900; background: var(--white); box-shadow: 5px 5px 0px var(--black); text-transform: uppercase; font-family: inherit; }
        button:active { transform: translate(2px, 2px); box-shadow: none; }

        @media print { 
            .no-print, .action-col, button, .filter-section { display: none !important; }
            body { background: white; padding: 0; }
            .form-container { border: none; box-shadow: none; width: 100%; padding: 0; }
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <div style="flex-grow: 1;">
            <input type="text" id="corpName" value="ULLSWATER CORPORATION" style="font-size: 30px;" oninput="saveAndRefresh()">
            <input type="text" id="corpSub" value="OFFICIAL LIQUIDATION MANIFEST (MIRROR)" style="font-size: 14px;" oninput="saveAndRefresh()">
            <div style="margin-top: 25px;">REF NO: <input type="text" id="refNo" placeholder="JV-202X-000" style="width: 200px; border-bottom: 3px solid #000;" oninput="saveAndRefresh()"></div>
            <div style="margin-top: 10px;">DATE: <input type="date" id="repDate" style="width: 160px;" oninput="saveAndRefresh()"></div>
        </div>
        <div id="qrcode-container">
            <div id="qrcode"></div>
            <div style="font-size: 11px; font-weight: 900; margin-top: 8px; border-top: 3px solid #000; padding-top: 5px;">FULL AUDIT MIRROR (LEVEL H)</div>
        </div>
    </div>

    <div class="filter-section no-print">
        <span>FILTER COVERAGE:</span>
        FROM <input type="date" id="fFrom" oninput="applyFilter()">
        TO <input type="date" id="fTo" oninput="applyFilter()">
        <button onclick="resetFilter()" style="padding:4px 8px; font-size:10px; box-shadow:none;">RESET</button>
    </div>

    <table>
        <tr>
            <td style="text-align: left; width: 60%;"><strong>CLAIMANT:</strong> <input type="text" id="empName" placeholder="NAME" oninput="saveAndRefresh()"></td>
            <td style="text-align: left;"><strong>ADVANCE:</strong> PHP <input type="number" id="startAmt" oninput="calc(); saveAndRefresh()" value="0" step="0.01"></td>
        </tr>
    </table>

    <table id="liqTable">
        <thead><tr class="bg-black"><th style="width:18%;">DATE</th><th style="width:42%;">PARTICULARS (UNLIMITED TEXT)</th><th style="width:15%;">CAT</th><th style="width:20%;">AMOUNT</th><th class="action-col" style="width:45px;"></th></tr></thead>
        <tbody id="liqBody"></tbody>
    </table>
    
    <button class="no-print" onclick="addRow()" style="width:100%; margin-top:10px; background:#f9f9f9; border:2px dashed #000;">+ APPEND DATA MIRROR ENTRY</button>

    <div style="text-align: right; border: 5px solid #000; padding: 15px; margin-top: 20px;">
        <div style="font-weight: 800; font-size: 16px;">TOTAL LIQUIDATED: PHP <span id="totalExp">0.00</span></div>
        <div style="font-size: 26px; font-weight: 900; text-decoration: underline;">NET BALANCE: PHP <span id="balance">0.00</span></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 40px;">
        <div style="text-align: center;">
            <canvas id="sig-canvas"></canvas>
            <div style="border-top: 3px solid #000; font-size: 12px; font-weight: 900; padding-top: 5px;">CLAIMANT SIGNATURE</div>
        </div>
        <div style="display: flex; align-items: flex-end; justify-content: center; border-top: 3px solid #000; height: 120px; font-size: 12px; font-weight: 900;">
            FINANCE AUDIT / DATE
        </div>
    </div>

    <div class="no-print">
        <button onclick="window.print()" style="background: #00d9ff;">PRINT PDF</button>
        <button onclick="exportCSV()" style="background: #ffcc00;">EXPORT CSV MIRROR</button>
        <button onclick="document.getElementById('file-picker').click()" style="background: #fff;">BULK JSON LOAD</button>
        <button onclick="clearAll()" style="background: #ff5555; color: #fff;">WIPE ALL</button>
        <input type="file" id="file-picker" style="display:none;" accept=".json" onchange="handleFile(event)">
    </div>
</div>

<script>
    let qr;
    const canvas = document.getElementById('sig-canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    window.onload = () => {
        qr = new QRCode(document.getElementById("qrcode"), { 
            width: 280, 
            height: 280, 
            correctLevel: QRCode.CorrectLevel.H 
        });
        setupSig();
        loadLocal();
    };

    function addRow(d="", desc="", cat="", amt="0") {
        const tr = document.createElement('tr');
        tr.className = 'data-row';
        tr.innerHTML = `
            <td><input type="date" class="rDate" value="${d}" oninput="saveAndRefresh()"></td>
            <td><textarea class="rDesc" oninput="saveAndRefresh()">${desc}</textarea></td>
            <td><input type="text" class="rCat" value="${cat}" oninput="saveAndRefresh()"></td>
            <td><input type="number" class="rAmt" value="${amt}" step="0.01" style="text-align: right;" oninput="calc(); saveAndRefresh()"></td>
            <td class="action-col"><button onclick="this.parentElement.parentElement.remove(); calc(); saveAndRefresh()" style="background:#000; color:#fff; border:none; padding:4px 10px;">X</button></td>
        `;
        document.getElementById('liqBody').appendChild(tr);
        calc();
    }

    function calc() {
        let exp = 0;
        document.querySelectorAll('.data-row').forEach(r => {
            if(r.style.display !== 'none') exp += parseFloat(r.querySelector('.rAmt').value) || 0;
        });
        document.getElementById('totalExp').innerText = exp.toLocaleString(undefined, {minimumFractionDigits: 2});
        let start = parseFloat(document.getElementById('startAmt').value) || 0;
        document.getElementById('balance').innerText = (start - exp).toLocaleString(undefined, {minimumFractionDigits: 2});
    }

    function applyFilter() {
        const from = document.getElementById('fFrom').value;
        const to = document.getElementById('fTo').value;
        document.querySelectorAll('.data-row').forEach(r => {
            const rowDate = r.querySelector('.rDate').value;
            r.style.display = ((!from || rowDate >= from) && (!to || rowDate <= to)) ? '' : 'none';
        });
        calc(); saveAndRefresh();
    }

    function resetFilter() {
        document.getElementById('fFrom').value = ''; document.getElementById('fTo').value = '';
        document.querySelectorAll('.data-row').forEach(r => r.style.display = '');
        calc(); saveAndRefresh();
    }

    function saveAndRefresh() {
        const allItems = Array.from(document.querySelectorAll('.data-row')).map(r => ({
            d: r.querySelector('.rDate').value,
            desc: r.querySelector('.rDesc').value,
            cat: r.querySelector('.rCat').value,
            amt: r.querySelector('.rAmt').value,
            visible: r.style.display !== 'none'
        }));
        
        const data = { 
            corp: document.getElementById('corpName').value,
            ref: document.getElementById('refNo').value, 
            emp: document.getElementById('empName').value, 
            date: document.getElementById('repDate').value, 
            start: document.getElementById('startAmt').value, 
            items: allItems 
        };
        
        localStorage.setItem('ULLSWATER_V7_1', JSON.stringify(data));
        
        // QR Mirror: Visible Data only, exact text
        const manifest = allItems.filter(i => i.visible);
        qr.makeCode(JSON.stringify({...data, items: manifest}));
    }

    function exportCSV() {
        // CSV headers
        let csv = [`"ULLSWATER LIQUIDATION MIRROR"`, `"REF:","${document.getElementById('refNo').value}"`, `"CLAIMANT:","${document.getElementById('empName').value}"`, `"DATE","PARTICULARS","CATEGORY","AMOUNT"`];
        
        document.querySelectorAll('.data-row').forEach(r => {
            if(r.style.display !== 'none') {
                const d = r.querySelector('.rDate').value;
                const desc = r.querySelector('.rDesc').value.replace(/"/g, '""'); // Escape double quotes
                const cat = r.querySelector('.rCat').value;
                const amt = r.querySelector('.rAmt').value;
                csv.push(`"${d}","${desc}","${cat}","${amt}"`);
            }
        });
        
        const blob = new Blob([csv.join('\n')], {type: 'text/csv'});
        const link = document.createElement('a'); 
        link.href = URL.createObjectURL(blob);
        link.download = `ULLSWATER_MIRROR_${document.getElementById('refNo').value || 'REPORT'}.csv`;
        link.click();
    }

    function handleFile(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const json = JSON.parse(ev.target.result);
                const items = json.items || json;
                items.forEach(i => addRow(i.d, i.desc, i.cat, i.amt));
                saveAndRefresh();
            } catch(err) { alert("Invalid JSON"); }
        };
        reader.readAsText(e.target.files[0]);
    }

    function setupSig() {
        const getXY = (e) => {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return [cx - rect.left, cy - rect.top];
        };
        const start = (e) => { drawing = true; const [x,y] = getXY(e); ctx.beginPath(); ctx.moveTo(x,y); };
        const move = (e) => { if(!drawing) return; e.preventDefault(); const [x,y] = getXY(e); ctx.lineTo(x,y); ctx.stroke(); };
        const stop = () => drawing = false;
        canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
        canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', move); canvas.addEventListener('touchend', stop);
    }

    function loadLocal() {
        const saved = JSON.parse(localStorage.getItem('ULLSWATER_V7_1'));
        if(saved) {
            document.getElementById('corpName').value = saved.corp || "ULLSWATER CORPORATION";
            document.getElementById('refNo').value = saved.ref || "";
            document.getElementById('empName').value = saved.emp || "";
            document.getElementById('repDate').value = saved.date || "";
            document.getElementById('startAmt').value = saved.start || "0";
            if(saved.items) saved.items.forEach(i => addRow(i.d, i.desc, i.cat, i.amt));
        } else { document.getElementById('repDate').valueAsDate = new Date(); addRow(); }
    }
    function clearAll() { if(confirm("WIPE SYSTEM?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
